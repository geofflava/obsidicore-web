<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not found — Obsidicore</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#121014">
<meta name="color-scheme" content="dark">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<style>
  :root{
    --obsidian:#121014; --glass:#1A171D; --ink:#EAE6E0; --ash:#948D95;
    --line:rgba(234,230,224,.13); --line-soft:rgba(234,230,224,.07);
    --ember:#FF5B1F;
    --mono:"Cascadia Code","JetBrains Mono",Consolas,ui-monospace,"SF Mono",monospace;
    --body:system-ui,"Segoe UI",Inter,-apple-system,sans-serif;
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0}
  body{
    background:var(--obsidian);color:var(--ink);font:16px/1.65 var(--body);-webkit-font-smoothing:antialiased;
    min-height:100vh;display:grid;place-items:center;padding:24px;
  }
  a{color:var(--ink)}
  a:hover{color:var(--ember)}
  :focus-visible{outline:2px solid var(--ember);outline-offset:2px;border-radius:2px}
  .slab{
    width:100%;max-width:560px;border:1px solid var(--line);border-radius:2px;padding:46px 40px 42px;
    background:
      linear-gradient(112deg, rgba(234,230,224,.055) 0%, rgba(234,230,224,.015) 22%, transparent 40%),
      linear-gradient(180deg, #1B1820, #141117 70%);
    position:relative;overflow:hidden;
  }
  .slab::after{content:"";position:absolute;top:-40%;right:-12%;width:52%;height:150%;background:linear-gradient(100deg, transparent 44%, rgba(234,230,224,.05) 50%, transparent 56%);pointer-events:none}
  .code{font:600 10.5px/1.7 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--ember)}
  h1{font:800 clamp(24px,4.4vw,34px)/1.2 var(--mono);letter-spacing:-.015em;margin:12px 0 14px}
  p{color:var(--ash);max-width:52ch}
  .btn{display:inline-block;font:700 12px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border-radius:2px;padding:13px 18px;margin-top:26px;background:var(--ember);color:#160b04;border:1px solid var(--ember)}
  .btn:hover{background:#ff7038}
</style>
</head>
<body>
  <main class="slab" aria-label="404">
    <span class="code">Error 404</span>
    <h1>No page at that path.</h1>
    <p>The link may be old, or the page moved. Obsidicore fits on one page — start there.</p>
    <a class="btn" href="/">Back to obsidicore.com →</a>
  </main>
</body>
</html>
